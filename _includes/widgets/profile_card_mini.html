<aside class="profile-card mini-card">
  <img class="portrait" src="{{ site.data.profile.portrait_url | relative_url }}" alt="{{ site.data.profile.primary_name }}" />
  <h1>{{ site.data.profile.primary_name }}</h1>
  {% if site.data.profile.secondary_name %}<p class="secondary-name">{{ site.data.profile.secondary_name }}</p>{% endif %}
  <div class="positions">
    {% for position in site.data.profile.positions %}
      <p>{{ position }}</p>
    {% endfor %}
  </div>
  <p class="email"><a href="mailto:{{ site.data.profile.email }}">{{ site.data.profile.email }}</a></p>
  {% include widgets/social_links.html %}
</aside>
