<header class="site-header">
  <nav class="navbar">
    <a class="navbar-brand" href="{{ '/' | relative_url }}">{{ site.data.profile.navbar_name }}</a>
    <button class="navbar-toggle" aria-label="Toggle navigation" onclick="document.body.classList.toggle('nav-open')">☰</button>
    <div class="navbar-links">
      <a {% if page.url == '/' %}class="active"{% endif %} href="{{ '/' | relative_url }}">Home</a>
      <a {% if page.url contains 'index_layout2' %}class="active"{% endif %} href="{{ '/index_layout2.html' | relative_url }}">Home (Layout 2)</a>
      <a {% if page.url contains 'publications' %}class="active"{% endif %} href="{{ '/publications.html' | relative_url }}">Publications</a>
      <a {% if page.url contains 'showcase' %}class="active"{% endif %} href="{{ '/showcase.html' | relative_url }}">Showcase</a>
    </div>
  </nav>
</header>
