short_bio: >-
  Le Li received the B.S. degree in Electrical Engineering and Automation from China University of Mining and Technology-Beijing, Beijing, China, in 2018, and the Ph.D. degree in Control Theory and Control Engineering from Beihang University, Beijing, China, in 2024. She is currently a Boya Postdoctoral Fellow at Peking University, Beijing, China. Her research interests include distributed parameter systems, flexible mechanical systems, boundary control, constrained control, multi-agent systems, adaptive control, and vibration control.

research_focus: >-
  Modeling, analysis, and control of flexible mechanical systems described by PDE-ODE coupled dynamics.

