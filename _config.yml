# Site settings for Le Li academic homepage
# Repository: layla95-git.github.io

title: "Le Li"
description: "Academic homepage of Le Li, Postdoctoral Researcher at Peking University."
url: "https://layla95-git.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

collections:
  publications:
    output: false
  showcase:
    output: true
    permalink: /showcase/:name/

exclude:
  - README_LELI_SETUP.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - .gitignore

sass:
  style: compressed
